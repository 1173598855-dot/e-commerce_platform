services:
  # ==================== 基础设施 ====================
  mysql:
    image: mysql:8.0
    container_name: ecommerce-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ecommerce
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ecommerce-net

  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-net

  # ==================== 微服务 ====================
  auth-service:
    build: ./backend/microservices/auth-service
    container_name: ecommerce-auth-service
    restart: always
    # 生产环境：内部端口不对外暴露（去掉 ports 映射）
    # ports:
    #   - "4006:4006"
    environment:
      AUTH_SERVICE_PORT: 4006
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ecommerce
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-ecommerce_jwt_secret_key_2024}
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-net

  user-service:
    build: ./backend/microservices/user-service
    container_name: ecommerce-user-service
    restart: always
    environment:
      USER_SERVICE_PORT: 4001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ecommerce
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ecommerce-net

  product-service:
    build: ./backend/microservices/product-service
    container_name: ecommerce-product-service
    restart: always
    environment:
      PRODUCT_SERVICE_PORT: 4002
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ecommerce
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ecommerce-net

  order-service:
    build: ./backend/microservices/order-service
    container_name: ecommerce-order-service
    restart: always
    environment:
      ORDER_SERVICE_PORT: 4003
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ecommerce
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ecommerce-net

  mq-service:
    build: ./backend/microservices/mq-service
    container_name: ecommerce-mq-service
    restart: always
    environment:
      MQ_SERVICE_PORT: 4004
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ecommerce
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-net

  search-service:
    build: ./backend/microservices/search-service
    container_name: ecommerce-search-service
    restart: always
    environment:
      SEARCH_SERVICE_PORT: 4005
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ecommerce
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ecommerce-net

  # ==================== 网关（唯一对外）====================
  gateway:
    build: ./backend/microservices/gateway
    container_name: ecommerce-gateway
    restart: always
    ports:
      - "4000:4000"
    environment:
      GATEWAY_PORT: 4000
      USER_SERVICE_HOST: user-service
      USER_SERVICE_PORT: 4001
      PRODUCT_SERVICE_HOST: product-service
      PRODUCT_SERVICE_PORT: 4002
      ORDER_SERVICE_HOST: order-service
      ORDER_SERVICE_PORT: 4003
      MQ_SERVICE_HOST: mq-service
      MQ_SERVICE_PORT: 4004
      SEARCH_SERVICE_HOST: search-service
      SEARCH_SERVICE_PORT: 4005
      AUTH_SERVICE_HOST: auth-service
      AUTH_SERVICE_PORT: 4006
      JWT_SECRET: ${JWT_SECRET:-ecommerce_jwt_secret_key_2024}
      NODE_ENV: production
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      mq-service:
        condition: service_healthy
      search-service:
        condition: service_healthy
    networks:
      - ecommerce-net

  # ==================== Nginx（唯一对外 443）====================
  nginx:
    image: nginx:alpine
    container_name: ecommerce-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - gateway
    networks:
      - ecommerce-net

volumes:
  mysql_data:
  redis_data:

networks:
  ecommerce-net:
    driver: bridge
