services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: ecommerce-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecommerce
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - ecommerce-net

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - ecommerce-net

  # Auth 微服务（认证中心）
  auth-service:
    build: ./backend/microservices/auth-service
    container_name: ecommerce-auth-service
    restart: always
    ports:
      - "4006:4006"
    environment:
      PORT: 4006
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: ecommerce
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ecommerce_jwt_secret_key_2024
      NODE_ENV: production
    depends_on:
      - mysql
      - redis
    networks:
      - ecommerce-net

  # User 微服务
  user-service:
    build: ./backend/microservices/user-service
    container_name: ecommerce-user-service
    restart: always
    ports:
      - "4001:4001"
    environment:
      USER_SERVICE_PORT: 4001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: ecommerce
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ecommerce_jwt_secret_key_2024
      NODE_ENV: production
    depends_on:
      - mysql
      - redis
    networks:
      - ecommerce-net

  # Product 微服务
  product-service:
    build: ./backend/microservices/product-service
    container_name: ecommerce-product-service
    restart: always
    ports:
      - "4002:4002"
    environment:
      PRODUCT_SERVICE_PORT: 4002
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: ecommerce
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ecommerce_jwt_secret_key_2024
      NODE_ENV: production
    depends_on:
      - mysql
      - redis
    networks:
      - ecommerce-net

  # Order 微服务
  order-service:
    build: ./backend/microservices/order-service
    container_name: ecommerce-order-service
    restart: always
    ports:
      - "4003:4003"
    environment:
      ORDER_SERVICE_PORT: 4003
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: ecommerce
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ecommerce_jwt_secret_key_2024
      NODE_ENV: production
    depends_on:
      - mysql
      - redis
    networks:
      - ecommerce-net

  # MQ 微服务
  mq-service:
    build: ./backend/microservices/mq-service
    container_name: ecommerce-mq-service
    restart: always
    ports:
      - "4004:4004"
    environment:
      MQ_SERVICE_PORT: 4004
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: ecommerce
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ecommerce_jwt_secret_key_2024
      NODE_ENV: production
    depends_on:
      - mysql
      - redis
    networks:
      - ecommerce-net

  # Search 微服务
  search-service:
    build: ./backend/microservices/search-service
    container_name: ecommerce-search-service
    restart: always
    ports:
      - "4005:4005"
    environment:
      SEARCH_SERVICE_PORT: 4005
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: ecommerce
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ecommerce_jwt_secret_key_2024
      NODE_ENV: production
    depends_on:
      - mysql
      - redis
    networks:
      - ecommerce-net

  # API 网关
  gateway:
    build: ./backend/microservices/gateway
    container_name: ecommerce-gateway
    restart: always
    ports:
      - "4000:4000"
    environment:
      GATEWAY_PORT: 4000
      USER_SERVICE_PORT: 4001
      PRODUCT_SERVICE_PORT: 4002
      ORDER_SERVICE_PORT: 4003
      MQ_SERVICE_PORT: 4004
      SEARCH_SERVICE_PORT: 4005
      AUTH_SERVICE_PORT: 4006
      JWT_SECRET: ecommerce_jwt_secret_key_2024
      NODE_ENV: production
    depends_on:
      - auth-service
      - user-service
      - product-service
      - order-service
      - mq-service
      - search-service
    networks:
      - ecommerce-net

  # Nginx 反向代理（P3）
  nginx:
    image: nginx:alpine
    container_name: ecommerce-nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway
    networks:
      - ecommerce-net

volumes:
  mysql_data:
  redis_data:

networks:
  ecommerce-net:
    driver: bridge