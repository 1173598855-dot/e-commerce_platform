services:
  # ==================== 基础设施 ====================
  mysql:
    image: mysql:8.0
    container_name: ecommerce-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_DATABASE: ecommerce
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:?DB_PASSWORD is required}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ecommerce-net

  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-net

  # ==================== 微服务 ====================
  auth-service:
    build:
      context: ./backend/microservices
      dockerfile: auth-service/Dockerfile
    container_name: ecommerce-auth-service
    restart: always
    # 生产环境：内部端口不对外暴露（去掉 ports 映射）
    # ports:
    #   - "4006:4006"
    environment:
      AUTH_SERVICE_PORT: 4006
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ecommerce
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      SMS_PROVIDER: ${SMS_PROVIDER:-console}
      SMS_CONSOLE_LOG_CODE: ${SMS_CONSOLE_LOG_CODE:-false}
      SMS_SIGN_NAME: ${SMS_SIGN_NAME:-}
      SMS_TEMPLATE_CODE: ${SMS_TEMPLATE_CODE:-}
      SMS_ACCESS_KEY_ID: ${SMS_ACCESS_KEY_ID:-}
      SMS_ACCESS_KEY_SECRET: ${SMS_ACCESS_KEY_SECRET:-}
      SMS_ENDPOINT: ${SMS_ENDPOINT:-}
      SMS_APP_ID: ${SMS_APP_ID:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-net

  user-service:
    build:
      context: ./backend/microservices
      dockerfile: user-service/Dockerfile
    container_name: ecommerce-user-service
    restart: always
    environment:
      USER_SERVICE_PORT: 4001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ecommerce
      ASSET_BASE_URL: ${ASSET_BASE_URL:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ecommerce-net

  product-service:
    build:
      context: ./backend/microservices
      dockerfile: product-service/Dockerfile
    container_name: ecommerce-product-service
    restart: always
    environment:
      PRODUCT_SERVICE_PORT: 4002
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ecommerce
      ASSET_BASE_URL: ${ASSET_BASE_URL:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ecommerce-net

  order-service:
    build:
      context: ./backend/microservices
      dockerfile: order-service/Dockerfile
    container_name: ecommerce-order-service
    restart: always
    environment:
      ORDER_SERVICE_PORT: 4003
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ecommerce
      ASSET_BASE_URL: ${ASSET_BASE_URL:-}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-mock}
      PAYMENT_CALLBACK_BASE_URL: ${PAYMENT_CALLBACK_BASE_URL:-}
      WECHAT_PAY_MCH_ID: ${WECHAT_PAY_MCH_ID:-}
      WECHAT_PAY_APP_ID: ${WECHAT_PAY_APP_ID:-}
      WECHAT_PAY_API_V3_KEY: ${WECHAT_PAY_API_V3_KEY:-}
      WECHAT_PAY_CERT_SERIAL_NO: ${WECHAT_PAY_CERT_SERIAL_NO:-}
      ALIPAY_APP_ID: ${ALIPAY_APP_ID:-}
      ALIPAY_PRIVATE_KEY: ${ALIPAY_PRIVATE_KEY:-}
      ALIPAY_PUBLIC_KEY: ${ALIPAY_PUBLIC_KEY:-}
      REFUND_EVIDENCE_STORAGE_PROVIDER: ${REFUND_EVIDENCE_STORAGE_PROVIDER:-mock}
      REFUND_EVIDENCE_STORAGE_BUCKET: ${REFUND_EVIDENCE_STORAGE_BUCKET:-}
      REFUND_EVIDENCE_STORAGE_REGION: ${REFUND_EVIDENCE_STORAGE_REGION:-}
      REFUND_EVIDENCE_STORAGE_ENDPOINT: ${REFUND_EVIDENCE_STORAGE_ENDPOINT:-}
      REFUND_EVIDENCE_STORAGE_ACCESS_KEY: ${REFUND_EVIDENCE_STORAGE_ACCESS_KEY:-}
      REFUND_EVIDENCE_STORAGE_SECRET_KEY: ${REFUND_EVIDENCE_STORAGE_SECRET_KEY:-}
      REFUND_EVIDENCE_PUBLIC_BASE_URL: ${REFUND_EVIDENCE_PUBLIC_BASE_URL:-http://localhost:8080/uploads}
      REFUND_EVIDENCE_ALLOWED_MIME_TYPES: ${REFUND_EVIDENCE_ALLOWED_MIME_TYPES:-image/jpeg,image/png,image/webp,video/mp4,application/pdf}
      REFUND_EVIDENCE_MAX_FILE_SIZE_BYTES: ${REFUND_EVIDENCE_MAX_FILE_SIZE_BYTES:-10485760}
      REFUND_EVIDENCE_UPLOAD_EXPIRES_SECONDS: ${REFUND_EVIDENCE_UPLOAD_EXPIRES_SECONDS:-600}
      REFUND_EVIDENCE_SCANNER_SECRET: ${REFUND_EVIDENCE_SCANNER_SECRET:-}
      REFUND_EVIDENCE_SCANNER_TIMESTAMP_TOLERANCE_SECONDS: ${REFUND_EVIDENCE_SCANNER_TIMESTAMP_TOLERANCE_SECONDS:-300}
      REFUND_EVIDENCE_RETENTION_DAYS: ${REFUND_EVIDENCE_RETENTION_DAYS:-180}
      ORDER_TIMEOUT_WORKER_ENABLED: ${ORDER_TIMEOUT_WORKER_ENABLED:-true}
      ORDER_PAYMENT_TIMEOUT_MINUTES: ${ORDER_PAYMENT_TIMEOUT_MINUTES:-30}
      ORDER_TIMEOUT_BATCH_SIZE: ${ORDER_TIMEOUT_BATCH_SIZE:-50}
      ORDER_TIMEOUT_WORKER_INTERVAL_MS: ${ORDER_TIMEOUT_WORKER_INTERVAL_MS:-60000}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ecommerce-net

  mq-service:
    build:
      context: ./backend/microservices
      dockerfile: mq-service/Dockerfile
    container_name: ecommerce-mq-service
    restart: always
    environment:
      MQ_SERVICE_PORT: 4004
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ecommerce
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-net

  search-service:
    build:
      context: ./backend/microservices
      dockerfile: search-service/Dockerfile
    container_name: ecommerce-search-service
    restart: always
    environment:
      SEARCH_SERVICE_PORT: 4005
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ecommerce
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ecommerce-net

  # ==================== 网关（唯一对外）====================
  gateway:
    build:
      context: ./backend/microservices
      dockerfile: gateway/Dockerfile
    container_name: ecommerce-gateway
    restart: always
    ports:
      - "4100:4000"
    environment:
      GATEWAY_PORT: 4000
      USER_SERVICE_HOST: user-service
      USER_SERVICE_PORT: 4001
      PRODUCT_SERVICE_HOST: product-service
      PRODUCT_SERVICE_PORT: 4002
      ORDER_SERVICE_HOST: order-service
      ORDER_SERVICE_PORT: 4003
      MQ_SERVICE_HOST: mq-service
      MQ_SERVICE_PORT: 4004
      SEARCH_SERVICE_HOST: search-service
      SEARCH_SERVICE_PORT: 4005
      AUTH_SERVICE_HOST: auth-service
      AUTH_SERVICE_PORT: 4006
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      NODE_ENV: production
    depends_on:
      auth-service:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      mq-service:
        condition: service_healthy
      search-service:
        condition: service_healthy
    networks:
      - ecommerce-net

  # ==================== Nginx（唯一对外 443）====================
  nginx:
    image: nginx:alpine
    container_name: ecommerce-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - gateway
    networks:
      - ecommerce-net

volumes:
  mysql_data:
  redis_data:

networks:
  ecommerce-net:
    driver: bridge
