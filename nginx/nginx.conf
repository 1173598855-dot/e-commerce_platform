worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream=$upstream_addr time=$request_time request_id=$request_id';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    server_tokens off;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20m;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain application/json application/javascript text/css application/xml;
    gzip_min_length 1024;
    gzip_vary on;

    # 限流
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    upstream gateway {
        server ecommerce-gateway:4000;
    }

    # HTTP -> HTTPS 强制跳转
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # 生产只开 443
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL 证书（部署时替换为真实路径）
        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # 健康检查
        location /health {
            proxy_pass http://gateway/api/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
        }

        # API 代理（兼容 /api/ 和 /api/v1/）
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # 静态资源走 CDN（生产环境建议将 /uploads 等迁移到对象存储）
        location /uploads/ {
            # 如已迁移 CDN，可直接 403 或 rewrite 到 CDN 域名
            # rewrite ^/uploads/(.*)$ https://cdn.example.com/uploads/$1 permanent;
            add_header Content-Type application/json;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            return 403 '{"success":false,"code":"CDN_MIGRATED","message":"静态资源请访问CDN"}';
        }

        # 默认返回
        location / {
            add_header Content-Type application/json;
            add_header Cache-Control "no-store" always;
            return 404 '{"success":false,"code":"NOT_FOUND","message":"Not found"}';
        }
    }
}
