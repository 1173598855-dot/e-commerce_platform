name: Engineering Baseline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-node-tests:
    name: Backend node tests
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: test-secret-at-least-64-characters-for-ci-node-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/microservices/package-lock.json

      - name: Install backend microservice dependencies
        working-directory: backend/microservices
        run: npm ci

      - name: Run deterministic node tests
        working-directory: backend/microservices
        run: npm run test:node

  frontend-quality:
    name: Frontend lint and bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Build Android JS bundle
        working-directory: frontend
        run: npm run bundle:android

  compose-config:
    name: Docker Compose config
    runs-on: ubuntu-latest
    env:
      DB_PASSWORD: ci-db-password-for-config-only
      JWT_SECRET: ci-jwt-secret-at-least-64-characters-for-compose-config-only
      REDIS_PASSWORD: ci-redis-password-for-compose-config-only
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker compose configuration
        run: docker compose config

  docker-builds:
    name: Docker build smoke
    runs-on: ubuntu-latest
    needs: [backend-node-tests, frontend-quality, compose-config]
    env:
      DB_PASSWORD: ci-db-password-for-build-only
      JWT_SECRET: ci-jwt-secret-at-least-64-characters-for-docker-build-only
      REDIS_PASSWORD: ci-redis-password-for-docker-build-only
    steps:
      - uses: actions/checkout@v4

      - name: Build compose services without starting them
        run: docker compose build
